<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Playing Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .warning { background: #fff3cd; color: #856404; }
        .error { background: #f8d7da; color: #721c24; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
        .track-btn { background: #007bff; color: white; border: none; border-radius: 3px; }
        .control-btn { background: #28a745; color: white; border: none; border-radius: 3px; }
        .stop-btn { background: #dc3545; color: white; border: none; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>Music Playing Test</h1>
    <p>This test verifies that music actually starts playing when switching tracks.</p>
    
    <div id="status" class="status warning">
        <strong>Status:</strong> No music playing
    </div>
    
    <div>
        <h3>Quick Track Tests:</h3>
        <button class="track-btn" onclick="testTrack('epic-adventure', 'Epic Adventure')">🎵 Epic Adventure</button>
        <button class="track-btn" onclick="testTrack('battle-music', 'Battle Music')">⚔️ Battle Music</button>
        <button class="track-btn" onclick="testTrack('ambient-forest', 'Forest Ambient')">🌲 Forest Ambient</button>
        <button class="stop-btn" onclick="testTrack('-1', 'Stop')">🔇 Stop Music</button>
    </div>
    
    <div>
        <h3>Volume Tests:</h3>
        <button class="control-btn" onclick="testVolume(25)">🔉 25%</button>
        <button class="control-btn" onclick="testVolume(50)">🔊 50%</button>
        <button class="control-btn" onclick="testVolume(75)">🔊 75%</button>
        <button class="control-btn" onclick="testVolume(100)">🔊 100%</button>
    </div>
    
    <div>
        <h3>Audio Object Info:</h3>
        <div id="audio-info" style="background: #f8f9fa; padding: 10px; border-radius: 5px; font-family: monospace;">
            No audio object created yet
        </div>
    </div>
    
    <script>
        // Simulate the key variables and functions from the main app
        let active_background_sound = null;
        let active_track_id = -1;
        
        function updateStatus(message, type = 'warning') {
            const status = document.getElementById('status');
            status.innerHTML = `<strong>Status:</strong> ${message}`;
            status.className = `status ${type}`;
        }
        
        function updateAudioInfo() {
            const audioInfo = document.getElementById('audio-info');
            if (active_background_sound) {
                audioInfo.innerHTML = `
                    <strong>Audio Object:</strong> ✅ Created<br>
                    <strong>Volume:</strong> ${(active_background_sound.volume * 100).toFixed(0)}%<br>
                    <strong>Current Time:</strong> ${active_background_sound.currentTime.toFixed(1)}s<br>
                    <strong>Loop:</strong> ${active_background_sound.loop}<br>
                    <strong>Paused:</strong> ${active_background_sound.paused}<br>
                    <strong>Ready State:</strong> ${active_background_sound.readyState}
                `;
            } else {
                audioInfo.innerHTML = 'No audio object created yet';
            }
        }
        
        function testTrack(trackId, trackName) {
            console.log(`Testing track: ${trackName} (${trackId})`);
            
            if (trackId === '-1') {
                // Stop music
                if (active_background_sound) {
                    active_background_sound.pause();
                    active_background_sound = null;
                }
                active_track_id = -1;
                updateStatus('Music stopped', 'warning');
                updateAudioInfo();
                return;
            }
            
            // Create a test audio file (using a data URL with a short beep sound)
            // This simulates loading an actual music file
            try {
                if (active_background_sound) {
                    active_background_sound.pause();
                }
                
                // Create new audio object
                // Using a short data URL beep for testing since we don't have actual music files
                const testAudioData = 'data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmgfCjiJ1O/Hfinx';
                
                active_background_sound = new Audio(testAudioData);
                active_background_sound.loop = true;
                active_background_sound.volume = 0.5; // Start at 50%
                active_background_sound.currentTime = 0;
                active_track_id = trackId;
                
                // Set up event listeners
                active_background_sound.addEventListener('canplay', () => {
                    console.log('✅ Audio can play');
                    updateStatus(`${trackName} - Ready to play`, 'success');
                    updateAudioInfo();
                });
                
                active_background_sound.addEventListener('play', () => {
                    console.log('🎵 Audio started playing');
                    updateStatus(`${trackName} - Playing! 🎵`, 'success');
                    updateAudioInfo();
                });
                
                active_background_sound.addEventListener('pause', () => {
                    console.log('⏸️ Audio paused');
                    updateStatus(`${trackName} - Paused`, 'warning');
                    updateAudioInfo();
                });
                
                active_background_sound.addEventListener('error', (e) => {
                    console.error('❌ Audio error:', e);
                    updateStatus(`${trackName} - Error loading audio`, 'error');
                    updateAudioInfo();
                });
                
                // Attempt to play
                const playPromise = active_background_sound.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        console.log('🎵 Play promise resolved - music is playing!');
                        updateStatus(`${trackName} - Successfully playing! 🎵`, 'success');
                    }).catch((error) => {
                        console.error('❌ Play promise rejected:', error);
                        updateStatus(`${trackName} - Play failed: ${error.message}`, 'error');
                    });
                }
                
                updateStatus(`${trackName} - Loading...`, 'warning');
                updateAudioInfo();
                
            } catch (error) {
                console.error('❌ Error creating audio:', error);
                updateStatus(`${trackName} - Failed to create audio: ${error.message}`, 'error');
            }
        }
        
        function testVolume(volume) {
            if (active_background_sound) {
                active_background_sound.volume = volume / 100;
                console.log(`🔊 Volume set to ${volume}%`);
                updateStatus(`Volume changed to ${volume}%`, 'success');
                updateAudioInfo();
            } else {
                updateStatus('No music playing - start a track first', 'warning');
            }
        }
        
        // Update info every second
        setInterval(updateAudioInfo, 1000);
        
        // Initial status
        updateStatus('Ready - click a track button to test music playback');
        updateAudioInfo();
    </script>
</body>
</html>
