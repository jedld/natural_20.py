<style>
  .map-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  .map-card { cursor: pointer; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; background: #fafafa; box-shadow: 0 1px 2px rgba(0,0,0,0.05); transition: transform .12s ease, box-shadow .12s ease; position: relative; }
  .map-card:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.12); }
  .map-thumb { width: 100%; height: 100px; object-fit: cover; background: #eee; display: block; }
  .map-name { padding: 8px; font-weight: 600; font-size: 13px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .map-card.new { display: flex; align-items: center; justify-content: center; height: 142px; background: repeating-linear-gradient(45deg, #fafafa, #fafafa 10px, #f0f0f0 10px, #f0f0f0 20px); color: #666; }
  .map-card.new .plus { font-size: 28px; display: block; line-height: 1; }
  .map-card.new .label { margin-top: 6px; font-weight: 600; font-size: 13px; }
  .upload-overlay { position: absolute; top: 6px; right: 6px; display: flex; gap: 4px; }
  .upload-overlay .btn { padding: 2px 6px; font-size: 11px; }
</style>
<div class="map-grid" id="map-grid">
  {% for map_name in available_maps %}
    <div class="map-card" data-map-name="{{ map_name }}">
      <div class="upload-overlay">
        <button class="btn btn-xs btn-default upload-map-bg" title="Upload background" data-map-name="{{ map_name }}">
          <span class="glyphicon glyphicon-upload"></span>
        </button>
        {% if map_name != 'index' %}
          <button class="btn btn-xs btn-danger delete-map" title="Delete map" data-map-name="{{ map_name }}">
            <span class="glyphicon glyphicon-trash"></span>
          </button>
        {% endif %}
        <input type="file" class="map-bg-input" data-map-name="{{ map_name }}" accept="image/*" style="display:none;" />
      </div>
      <img class="map-thumb" src="/assets/maps/{{ map_name }}.png" alt="{{ map_name }}" onerror="this.onerror=null;this.src='/static/info.png';">
      <div class="map-name">{{ map_name }}</div>
    </div>
  {% endfor %}
  <div class="map-card new" id="create-new-map">
    <div style="text-align:center;">
      <span class="plus">+</span>
      <div class="label">Create New Map</div>
    </div>
  </div>
</div>
