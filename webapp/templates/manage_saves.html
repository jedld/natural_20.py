<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or 'Manage Saves' }}</title>
  <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
  <style>
    body { padding: 20px; }
    .save-list { max-height: 60vh; overflow-y: auto; }
    .filename { font-family: monospace; }
  </style>
</head>
<body>
  <div class="container">
    <h3>Manage Saves</h3>

    <div class="panel panel-default">
      <div class="panel-heading">Create Save</div>
      <div class="panel-body">
        <form id="save-form" class="form-inline">
          <div class="form-group">
            <label for="save-name">Name (optional):</label>
            <input type="text" id="save-name" class="form-control" placeholder="e.g. after_boss">
          </div>
          <button type="submit" class="btn btn-primary">Save Now</button>
          <span id="save-status" class="text-muted" style="margin-left:10px;"></span>
        </form>
      </div>
    </div>

    <div class="panel panel-default">
      <div class="panel-heading">Available Saves</div>
      <div class="panel-body save-list">
        <table class="table table-striped" id="saves-table">
          <thead>
            <tr>
              <th>Filename</th>
              <th>Modified</th>
              <th>Size</th>
              <th style="width:120px;">Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <button id="refresh-saves" class="btn btn-default">Refresh List</button>
        <span id="load-status" class="text-muted" style="margin-left:10px;"></span>
      </div>
    </div>

    <a href="/" class="btn btn-link">Back to Game</a>
  </div>

<script>
function humanSize(bytes){ if(bytes==null) return ''; var i = Math.floor(Math.log(bytes)/Math.log(1024)); return (bytes/Math.pow(1024,i)).toFixed(1)*1 + ' ' + ['B','kB','MB','GB','TB'][i]; }
function formatTime(ts){ if(!ts) return ''; var d = new Date(ts*1000); return d.toLocaleString(); }

function loadSaves(){
  $.getJSON('/admin/saves', function(resp){
    if(resp.error){ $('#load-status').text(resp.error); return; }
    var tbody = $('#saves-table tbody'); tbody.empty();
    (resp.saves||[]).forEach(function(s){
      var tr = $('<tr>');
      tr.append($('<td class="filename">').text(s.filename));
      tr.append($('<td>').text(formatTime(s.mtime)));
      tr.append($('<td>').text(humanSize(s.size)));
      var btn = $('<button class="btn btn-xs btn-primary">Load</button>').click(function(){
        $('#load-status').text('Loading '+s.filename+' ...');
        $.ajax({ url:'/admin/load', method:'POST', contentType:'application/json', data: JSON.stringify({ filename: s.filename }) })
          .done(function(){ $('#load-status').text('Loaded '+s.filename); })
          .fail(function(xhr){ $('#load-status').text('Error: '+(xhr.responseJSON && xhr.responseJSON.error || xhr.statusText)); });
      });
      tr.append($('<td>').append(btn));
      tbody.append(tr);
    });
  });
}

$('#save-form').submit(function(e){
  e.preventDefault();
  var name = $('#save-name').val();
  $('#save-status').text('Saving...');
  $.ajax({ url:'/admin/save', method:'POST', contentType:'application/json', data: JSON.stringify({ name: name }) })
    .done(function(){ $('#save-status').text('Saved.'); loadSaves(); })
    .fail(function(xhr){ $('#save-status').text('Error: '+(xhr.responseJSON && xhr.responseJSON.error || xhr.statusText)); });
});

$('#refresh-saves').click(loadSaves);
$(function(){ loadSaves(); });
</script>
</body>
</html>
