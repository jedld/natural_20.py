<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or 'Manage Saves' }}</title>
  <link href="/libs/bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet">
  <script src="/libs/jquery/jquery-3.2.1.min.js"></script>
  <script src="/libs/bootstrap/3.3.7/js/bootstrap.min.js"></script>
  <style>
    body { padding: 20px; }
    .save-list { max-height: 60vh; overflow-y: auto; }
    .filename { font-family: monospace; }
  </style>
</head>
<body>
  <div class="container">
    <h3>Manage Saves</h3>

    <div class="panel panel-default">
      <div class="panel-heading">Create Save</div>
      <div class="panel-body">
        <form id="save-form" class="form-inline">
          <div class="form-group">
            <label for="save-name">Name (optional):</label>
            <input type="text" id="save-name" class="form-control" placeholder="e.g. after_boss">
          </div>
          <button type="submit" class="btn btn-primary">Save Now</button>
          <span id="save-status" class="text-muted" style="margin-left:10px;"></span>
        </form>
      </div>
    </div>

    <div class="panel panel-danger">
      <div class="panel-heading">Campaign Text Logs (SQLite)</div>
      <div class="panel-body">
        <p class="text-muted">
          Persists combat log lines, NPC/PC chat, DM Assistant chat, and player journal entries
          for this campaign.
        </p>
        <p id="campaign-log-counts" class="small text-muted">Loading counts…</p>
        <label class="checkbox-inline" style="margin-right: 12px;">
          <input type="checkbox" id="reset-clear-conversation-buffers"> Also clear live NPC/PC conversation buffers
        </label>
        <button type="button" class="btn btn-danger btn-sm" id="reset-campaign-logs">Reset All Campaign Logs</button>
        <span id="campaign-log-status" class="text-muted" style="margin-left:10px;"></span>
      </div>
    </div>

    <div class="panel panel-default">
      <div class="panel-heading">Available Saves</div>
      <div class="panel-body save-list">
        <table class="table table-striped" id="saves-table">
          <thead>
            <tr>
              <th>Filename</th>
              <th>Modified</th>
              <th>Size</th>
              <th style="width:120px;">Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <button id="refresh-saves" class="btn btn-default">Refresh List</button>
        <span id="load-status" class="text-muted" style="margin-left:10px;"></span>
      </div>
    </div>

    <a href="/" class="btn btn-link">Back to Game</a>
  </div>

<script>
function humanSize(bytes){ if(bytes==null) return ''; var i = Math.floor(Math.log(bytes)/Math.log(1024)); return (bytes/Math.pow(1024,i)).toFixed(1)*1 + ' ' + ['B','kB','MB','GB','TB'][i]; }
function formatTime(ts){ if(!ts) return ''; var d = new Date(ts*1000); return d.toLocaleString(); }

function renderCampaignLogCounts(counts) {
  var labels = {
    combat: 'Combat log',
    conversation: 'NPC/PC chat',
    dm_assistant: 'DM Assistant',
    journal: 'Player journals'
  };
  var parts = [];
  Object.keys(labels).forEach(function(key) {
    var n = (counts && counts[key]) || 0;
    parts.push(labels[key] + ': ' + n);
  });
  $('#campaign-log-counts').text(parts.join(' · ') || 'No log entries yet.');
}

function loadCampaignLogStatus() {
  $.getJSON('/admin/campaign-logs/status', function(resp) {
    if (resp && resp.success) {
      renderCampaignLogCounts(resp.counts || {});
    } else {
      $('#campaign-log-counts').text('Could not load log counts.');
    }
  }).fail(function() {
    $('#campaign-log-counts').text('Could not load log counts.');
  });
}

function loadSaves(){
  $.getJSON('/admin/saves', function(resp){
    if(resp.error){ $('#load-status').text(resp.error); return; }
    var tbody = $('#saves-table tbody'); tbody.empty();
    (resp.saves||[]).forEach(function(s){
      var tr = $('<tr>');
      tr.append($('<td class="filename">').text(s.filename));
      tr.append($('<td>').text(formatTime(s.mtime)));
      tr.append($('<td>').text(humanSize(s.size)));
      var btn = $('<button class="btn btn-xs btn-primary">Load</button>').click(function(){
        $('#load-status').text('Loading '+s.filename+' ...');
        $.ajax({ url:'/admin/load', method:'POST', contentType:'application/json', data: JSON.stringify({ filename: s.filename }) })
          .done(function(){ $('#load-status').text('Loaded '+s.filename); })
          .fail(function(xhr){ $('#load-status').text('Error: '+(xhr.responseJSON && xhr.responseJSON.error || xhr.statusText)); });
      });
      tr.append($('<td>').append(btn));
      tbody.append(tr);
    });
  });
}

$('#save-form').submit(function(e){
  e.preventDefault();
  var name = $('#save-name').val();
  $('#save-status').text('Saving...');
  $.ajax({ url:'/admin/save', method:'POST', contentType:'application/json', data: JSON.stringify({ name: name }) })
    .done(function(){ $('#save-status').text('Saved.'); loadSaves(); })
    .fail(function(xhr){ $('#save-status').text('Error: '+(xhr.responseJSON && xhr.responseJSON.error || xhr.statusText)); });
});

$('#refresh-saves').click(loadSaves);

$('#reset-campaign-logs').click(function() {
  if (!confirm('Reset ALL campaign text logs for this campaign? This cannot be undone.')) {
    return;
  }
  $('#campaign-log-status').text('Resetting...');
  $.ajax({
    url: '/admin/campaign-logs/reset',
    method: 'POST',
    contentType: 'application/json',
    data: JSON.stringify({
      clear_live_conversation_buffers: $('#reset-clear-conversation-buffers').is(':checked')
    })
  }).done(function(resp) {
    if (resp && resp.success) {
      $('#campaign-log-status').text('Campaign logs reset.');
      renderCampaignLogCounts({});
    } else {
      $('#campaign-log-status').text('Reset failed.');
    }
  }).fail(function(xhr) {
    $('#campaign-log-status').text('Error: ' + (xhr.responseJSON && xhr.responseJSON.error || xhr.statusText));
  });
});

$(function(){ loadSaves(); loadCampaignLogStatus(); });
</script>
</body>
</html>
