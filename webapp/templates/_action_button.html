<td>
    {% set fallback_label = action.button_label() or action.label() %}
    <button class="action-button action-image {{ 'bonus-action' if action.as_bonus_action else '' }} {{ 'hide-action' if action.action_type in ['hide', 'hide_bonus'] else '' }}"
        data-action-type="{{ action.__class__.__name__ }}"
        data-action-opts='{{ action.to_h() | tojson }}'
        title="{{ action.label() }}"
        style="position: relative;"
        {{'disabled' if action.disabled else ''}}
        data-tooltips="{{ action.disabled_reason }}">
      {% if action.using %}
         {% set weapon_icon_slug = action.weapon_icon() if action.weapon_icon is defined else none %}
         {% if weapon_icon_slug %}
           {% set action_image_src = url_for('static', filename='assets/items/' + weapon_icon_slug + '.png') %}
         {% else %}
           {% set action_image_src = url_for('static', filename='assets/items/' + action.using + '.png') %}
         {% endif %}
      {% else %}
        {% if action.button_image()  %}
          {% set action_image_src = url_for('static', filename='actions/' + action.button_image() + '.png') %}
        {% else %}
          {% set action_image_src = url_for('static', filename='actions/' + action.action_type + action_flavors(action) + '.png') %}
        {% endif %}
      {% endif %}
      <img src="{{ action_image_src }}" alt="{{ fallback_label }}" style="width: 50px; height: 50px;" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <span class="action-image-fallback">{{ fallback_label }}</span>
      {% if action.as_bonus_action %}
      <div style="position: absolute; top: 0; left: 0; width: 50px; height: 50px; display: flex;  justify-content: center; background-color: rgba(255,255,255,0.4); color: black; font-weight: bold;">
        Bonus
      </div>
      {% endif %}
      {% if action.thrown %}
      <div style="position: absolute; top: 0; left: 0; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; background-color: rgba(0,0,0,0.2); color: white; font-weight: bold;">
        Thrown
      </div>
      {% endif %}
      {% if action.action_type == 'interact' and action.object_action[0] == 'give' and action.target %}
      <div style="position: absolute; bottom: 0; right: 0; width: 25px; height: 25px; border-radius: 50%; overflow: hidden; border: 2px solid white; box-shadow: 0 0 3px rgba(0,0,0,0.3);">
        {% set target_entity = action.target %}
        {% if target_entity %}
          <img src="{{ url_for('static', filename='assets/' + target_entity.profile_image()) }}" 
               alt="{{ target_entity.label() }}"
               style="width: 100%; height: 100%; object-fit: cover;">
        {% else %}
          <img src="{{ url_for('static', filename='assets/unknown.png') }}" 
               alt="Unknown Target"
               style="width: 100%; height: 100%; object-fit: cover;">
        {% endif %}
      </div>
      {% endif %}
    </button>
</td>
