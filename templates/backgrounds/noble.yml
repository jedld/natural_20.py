feature:
  name: Position of Privilege
  description: >
    "Thanks to your noble birth, people assume you have the right
    to achieve your goals, and that the means will adjust
    themselves. Common folk make every effort to accommodate you
    and avoid your wrath, and people in authority are often
    related to or connected with you."
  type: background_feature
