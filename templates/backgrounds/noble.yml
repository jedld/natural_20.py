name: Noble
description: >
  "You understand wealth, power, and privilege. You carry a noble
  title, and your family owns land, collects taxes, and wields
  significant political influence. You might be a pampered aristocrat
  unfamiliar with hardship, a former merchant raised to wealth, or
  a fallen noble trying to regain favor. Regardless, you have a
  strong sense of entitlement and expect the best of everything."
label: Noble
