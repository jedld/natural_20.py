name: Outlander
description: >
  "You grew up in the wilds, far from civilization and the comforts
  of town and technology. You've witnessed the migration of
  herd-animals larger than elephant, survived weather more extreme
  than your companions could imagine, and viewed sights that
  would dazzle the natives of a metropolitan area like Waterdeep.
  In your home region, you dealt with dragons on a weekly basis."
