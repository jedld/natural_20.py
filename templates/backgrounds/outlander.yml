feature:
  name: Wanderer
  description: >
    "You have an excellent memory for maps and geography, and you
    can recall the general layout of terrain, urban areas, and
    other settlements. You can find food, fresh water, and
    shelter for yourself and your adventuring party in
    settlements and the wilds."
