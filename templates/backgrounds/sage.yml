name: Sage
description: >
  "You spent years learning the lore of the multiverse. You scoured
  manuscripts, consulted wizards, and traveled to far-flung
  libraries to pursue your studies. Your efforts have made you
  a master in your fields of expertise. Your fields of study are
  unrelated, perhaps seeming so as to be contradictory, but you
  persevered where others might have given up."
