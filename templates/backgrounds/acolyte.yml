name: Acolyte
description: >
  You have spent your life in the service of a temple to a specific god or gods.
  You act as an intermediary between the higher powers and the people,
  performing sacred rituals in a grand cathedral or making the rounds of the
  faithful in a hall of healing. Your closest friends and companions are your
  fellow worshippers, and you are valued by the priests of the temple.
label: Acolyte
