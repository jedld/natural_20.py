feature:
  name: Shelter of the Faithful
  description: >
    As an acolyte, you command the respect of those who share your faith,
    and you can perform the religious ceremonies of your deity. You and
    your adventuring companions can expect to receive free healing and care
    at a temple, shrine, or other established presence of your faith, in
    exchange for an offering of some value. (It's not uncommon to offer
    money, food, or precious metals as tithes to the temple, at an amount
    equal to 5d10 gp per character.) You may also bury the dead of your
    faith in consecrated ground owned by the church.
  type: background_feature
