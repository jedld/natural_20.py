feature:
  name: Discovery
  description: >
    "The seclusion you enjoyed while living like a hermit led to
    a significant discovery — the nature of a local mystery, the
    existence of hitherto-unknown creatures, a cache of previously
    lost treasure, or a secret society — that you can reveal to
    others. The exact nature of the discovery is up to you, but
    it should have an effect on your interactions with NPCs and
    possibly alter the course of the campaign."
  type: background_feature
