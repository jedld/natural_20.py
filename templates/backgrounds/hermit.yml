name: Hermit
description: >
  "You lived in seclusion — either in a secluded habitation or,
  more recently, wandering alone — for a substantial period.
  Dwelling outside the fringes of society, away from the clamor
  and concerns of civilization, imbues a unique perspective on
  things that few possess. You learned to be content with simple
  things, and you are able to predict the actions and model the
  thought processes of those who aren't yet free from the influence
  of culture and society."
label: Hermit
skill_proficiencies:
  - medicine
  - religion
tool_proficiencies: []
languages: []
