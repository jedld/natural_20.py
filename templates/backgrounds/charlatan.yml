name: Charlatan
description: >
  You are a scoundrel who has found profit in turning your hand to
  fraud, deception, and sleight of hand. You know all the tricks.
  Your crimes have never been serious enough to attract a long-term
  pursuer, and you have gotten away with it time and time again.
