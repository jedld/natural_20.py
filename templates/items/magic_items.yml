# ============================================================================
# Magic Items — weapons, armor, shields, and accessories
# ============================================================================
# Each entry may carry:
#   magical: true                # marks the item as magical (bypasses non-magical resistance)
#   magic_bonus: <int>           # flat bonus to attack/damage (weapons) or AC (armor/shields)
#   properties: [...]            # extra D&D properties (e.g. sentient, attunement)
#   requires_attunement: true    # needs attunement to use
#   attunement_race/class: ...   # restricted attunement
# ============================================================================

