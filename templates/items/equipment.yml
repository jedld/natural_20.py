    I hope this letter finds you well. I have been thinking about you a lot lately and I wanted to reach out to you. I know we haven't spoken in a while, but I wanted to let you know that I miss you and I hope you are doing okay. I know things have been tough for you lately, but I want you to know that I am here for you if you need me. Please don't hesitate to reach out if you need anything. I care about you and I want you to be happy. I hope to hear from you soon.
    Sincerely,
    Your friend
